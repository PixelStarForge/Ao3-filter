name: Create Release Zip

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create lightweight zip
        run: |
          zip -r ao3-filter.zip . \
            -x "*.git*" \
            -x ".github/*" \
            -x "photos/*" \
            -x "*.md" \
            -x "LICENSE" \
            -x "README.md"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ao3-filter.zip
          generate_release_notes: true